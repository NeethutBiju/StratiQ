<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – StratiQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spinning { animation: spin 0.8s linear infinite; display: inline-block; }
  </style>
</head>
<body class="font-sans bg-gradient-to-br from-[#0d1b0d] via-[#102210] to-[#0a150a] min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md my-8">

    <!-- Logo -->
    <div class="flex items-center justify-center gap-2 mb-8">
      <svg class="w-8 h-8 text-[#13ec13]" fill="currentColor" viewBox="0 0 48 48">
        <path d="M24 4C25.7818 14.2173 33.7827 22.2182 44 24C33.7827 25.7818 25.7818 33.7827 24 44C22.2182 33.7827 14.2173 25.7818 4 24C14.2173 22.2182 22.2182 14.2173 24 4Z"/>
      </svg>
      <span style="color:white;font-size:1.5rem;font-weight:900;letter-spacing:-0.5px">StratiQ</span>
    </div>

    <!-- Card -->
    <div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:1rem;padding:2rem;box-shadow:0 25px 50px rgba(0,0,0,0.5)">

      <h1 style="color:white;font-size:1.4rem;font-weight:800;margin-bottom:0.25rem">Create your account</h1>
      <p style="color:#9ca3af;font-size:0.875rem;margin-bottom:1.5rem">Join StratiQ to start your growth journey</p>

      <!-- Error -->
      <div id="authError" style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;font-size:0.8rem;padding:0.75rem 1rem;border-radius:0.5rem;margin-bottom:1rem"></div>

      <!-- Role Picker -->
      <p style="color:#d1d5db;font-size:0.8rem;font-weight:600;margin-bottom:0.5rem">I am a...</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1.25rem">
        <div id="vendorCard" onclick="selectRole('vendor')" style="cursor:pointer;border:2px solid #13ec13;background:rgba(19,236,19,0.08);border-radius:0.75rem;padding:1rem;text-align:center">
          <span class="material-symbols-outlined" style="color:#13ec13;font-size:2rem;display:block;margin-bottom:0.25rem">storefront</span>
          <span style="color:white;font-weight:700;font-size:0.875rem">Vendor</span>
          <p style="color:#9ca3af;font-size:0.7rem;margin-top:0.2rem">Pitches & growth plans</p>
        </div>
        <div id="investorCard" onclick="selectRole('investor')" style="cursor:pointer;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);border-radius:0.75rem;padding:1rem;text-align:center">
          <span class="material-symbols-outlined" id="investorIcon" style="color:#6b7280;font-size:2rem;display:block;margin-bottom:0.25rem">account_balance</span>
          <span style="color:white;font-weight:700;font-size:0.875rem">Investor</span>
          <p style="color:#9ca3af;font-size:0.7rem;margin-top:0.2rem">Review & fund pitches</p>
        </div>
      </div>
      <input type="hidden" id="role" value="vendor"/>

      <!-- Full Name -->
      <div style="margin-bottom:1rem">
        <label style="color:#d1d5db;font-size:0.8rem;font-weight:600;display:block;margin-bottom:0.4rem">Full Name</label>
        <div style="position:relative">
          <span class="material-symbols-outlined" style="position:absolute;left:0.75rem;top:0.75rem;color:#6b7280;font-size:1.2rem">person</span>
          <input id="name" type="text" placeholder="Your full name" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:white;padding:0.75rem 1rem 0.75rem 2.5rem;border-radius:0.5rem;font-size:0.875rem;box-sizing:border-box;outline:none" onfocus="this.style.borderColor='#13ec13'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'"/>
        </div>
      </div>

      <!-- Email -->
      <div style="margin-bottom:1rem">
        <label style="color:#d1d5db;font-size:0.8rem;font-weight:600;display:block;margin-bottom:0.4rem">Email address</label>
        <div style="position:relative">
          <span class="material-symbols-outlined" style="position:absolute;left:0.75rem;top:0.75rem;color:#6b7280;font-size:1.2rem">mail</span>
          <input id="email" type="email" placeholder="you@example.com" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:white;padding:0.75rem 1rem 0.75rem 2.5rem;border-radius:0.5rem;font-size:0.875rem;box-sizing:border-box;outline:none" onfocus="this.style.borderColor='#13ec13'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'"/>
        </div>
      </div>

      <!-- Password -->
      <div style="margin-bottom:1rem">
        <label style="color:#d1d5db;font-size:0.8rem;font-weight:600;display:block;margin-bottom:0.4rem">Password</label>
        <div style="position:relative">
          <span class="material-symbols-outlined" style="position:absolute;left:0.75rem;top:0.75rem;color:#6b7280;font-size:1.2rem">lock</span>
          <input id="password" type="password" placeholder="Min. 6 characters" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:white;padding:0.75rem 1rem 0.75rem 2.5rem;border-radius:0.5rem;font-size:0.875rem;box-sizing:border-box;outline:none" onfocus="this.style.borderColor='#13ec13'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'"/>
        </div>
      </div>

      <!-- Confirm Password -->
      <div style="margin-bottom:1.5rem">
        <label style="color:#d1d5db;font-size:0.8rem;font-weight:600;display:block;margin-bottom:0.4rem">Confirm Password</label>
        <div style="position:relative">
          <span class="material-symbols-outlined" style="position:absolute;left:0.75rem;top:0.75rem;color:#6b7280;font-size:1.2rem">lock_reset</span>
          <input id="confirmPassword" type="password" placeholder="Re-enter your password" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:white;padding:0.75rem 1rem 0.75rem 2.5rem;border-radius:0.5rem;font-size:0.875rem;box-sizing:border-box;outline:none" onfocus="this.style.borderColor='#13ec13'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'"/>
        </div>
      </div>

      <!-- Submit Button -->
      <button id="registerBtn" onclick="doRegister()" style="width:100%;background:#13ec13;color:#0d1b0d;font-weight:800;padding:0.875rem;border-radius:0.5rem;font-size:0.9rem;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.5rem" onmouseover="this.style.background='#0fd60f'" onmouseout="this.style.background='#13ec13'">
        Create Account
        <span class="material-symbols-outlined" style="font-size:1rem">arrow_forward</span>
      </button>

      <p style="text-align:center;color:#9ca3af;font-size:0.8rem;margin-top:1.25rem">
        Already have an account?
        <a href="login.html" style="color:#13ec13;font-weight:700;text-decoration:none">Sign in</a>
      </p>
    </div>

    <p style="text-align:center;color:#4b5563;font-size:0.7rem;margin-top:1.5rem">© 2024 StratiQ Financial. All rights reserved.</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const app  = initializeApp({
      apiKey: "YOUR_FIREBASE_API_KEY",
      authDomain: "startiq-ae6af.firebaseapp.com",
      projectId: "startiq-ae6af",
      storageBucket: "startiq-ae6af.appspot.com",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "1:YOUR_MESSAGING_SENDER_ID:web:66b7b4c093cf41711a3245"
    });
    const auth = getAuth(app);
    const db   = getFirestore(app);

    window.doRegister = async function() {
      const name            = document.getElementById("name").value.trim();
      const email           = document.getElementById("email").value.trim();
      const password        = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const role            = document.getElementById("role").value;
      const btn             = document.getElementById("registerBtn");
      const errEl           = document.getElementById("authError");

      // Hide previous error
      errEl.style.display = "none";

      // Validate
      if (!name)                        return showErr("Please enter your full name.");
      if (!email)                       return showErr("Please enter your email.");
      if (!password)                    return showErr("Please enter a password.");
      if (password.length < 6)          return showErr("Password must be at least 6 characters.");
      if (password !== confirmPassword) return showErr("Passwords do not match.");

      // Loading state
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined spinning">refresh</span>&nbsp;Creating account...';
      btn.style.opacity = "0.7";

      try {
        // 1. Create Firebase Auth account
        const cred = await createUserWithEmailAndPassword(auth, email, password);

        // 2. Save to Firestore (best effort)
        try {
          await setDoc(doc(db, "users", cred.user.uid), {
            name, email, role,
            createdAt: new Date().toISOString()
          });
        } catch (e) {
          console.warn("Firestore save failed (check rules):", e.message);
        }

        // 3. Redirect
        window.location.href = role === "investor" ? "investordashboard.html" : "dashboard.html";

      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = 'Create Account <span class="material-symbols-outlined" style="font-size:1rem">arrow_forward</span>';
        btn.style.opacity = "1";

        if (err.code === "auth/email-already-in-use")
          showErr("An account already exists with this email. Try signing in.");
        else if (err.code === "auth/invalid-email")
          showErr("Please enter a valid email address.");
        else if (err.code === "auth/weak-password")
          showErr("Password too weak. Use at least 6 characters.");
        else
          showErr(err.message.replace("Firebase: ","").replace(/\(.*\)/,"").trim());
      }
    };

    function showErr(msg) {
      const el = document.getElementById("authError");
      el.textContent = msg;
      el.style.display = "block";
    }
  </script>

  <script>
    function selectRole(role) {
      document.getElementById("role").value = role;
      const vc = document.getElementById("vendorCard");
      const ic = document.getElementById("investorCard");
      const vi = vc.querySelector(".material-symbols-outlined");
      const ii = ic.querySelector(".material-symbols-outlined");

      if (role === "vendor") {
        vc.style.cssText = "cursor:pointer;border:2px solid #13ec13;background:rgba(19,236,19,0.08);border-radius:0.75rem;padding:1rem;text-align:center";
        vi.style.color = "#13ec13";
        ic.style.cssText = "cursor:pointer;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);border-radius:0.75rem;padding:1rem;text-align:center";
        ii.style.color = "#6b7280";
      } else {
        ic.style.cssText = "cursor:pointer;border:2px solid #13ec13;background:rgba(19,236,19,0.08);border-radius:0.75rem;padding:1rem;text-align:center";
        ii.style.color = "#13ec13";
        vc.style.cssText = "cursor:pointer;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);border-radius:0.75rem;padding:1rem;text-align:center";
        vi.style.color = "#6b7280";
      }
    }

    const p = new URLSearchParams(window.location.search).get("role");
    if (p === "investor") selectRole("investor");
  </script>
</body>
</html>
