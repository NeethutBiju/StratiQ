<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Investor Dashboard – StratiQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#13ec13" },
          fontFamily: { display: ["Manrope", "sans-serif"] }
        }
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const app  = initializeApp({
      apiKey: "AIzaSyARQqXg3L8luRb01k-yn2chyiFWEbn_9iM",
      authDomain: "startiq-ae6af.firebaseapp.com",
      projectId: "startiq-ae6af",
      storageBucket: "startiq-ae6af.appspot.com",
      messagingSenderId: "1081848840736",
      appId: "1:1081848840736:web:66b7b4c093cf41711a3245"
    });
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // Expose logout globally so onclick="logout()" works
    window.logout = async function() {
      await signOut(auth);
      location.href = "login.html";
    };

    onAuthStateChanged(auth, async user => {
      if (!user) { location.href = "login.html"; return; }

      document.getElementById("userName").textContent = user.displayName || user.email;

      try {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists() && snap.data().role === "vendor") {
          location.href = "dashboard.html";
        }
      } catch(e) { /* Firestore rules not set yet — skip */ }
    });
  </script>
</head>
<body class="font-display bg-[#0d1b0d] text-white min-h-screen">

  <!-- Nav -->
  <nav class="sticky top-0 z-50 border-b border-white/10 bg-[#0d1b0d]/95 backdrop-blur-sm">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <svg class="w-7 h-7 text-[#13ec13]" fill="currentColor" viewBox="0 0 48 48">
          <path d="M24 4C25.7818 14.2173 33.7827 22.2182 44 24C33.7827 25.7818 25.7818 33.7827 24 44C22.2182 33.7827 14.2173 25.7818 4 24C14.2173 22.2182 22.2182 14.2173 24 4Z"/>
        </svg>
        <span class="font-black text-lg">StratiQ</span>
        <span class="text-xs bg-[#13ec13]/10 text-[#13ec13] border border-[#13ec13]/20 px-2 py-0.5 rounded-full ml-1">Investor</span>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-gray-400 text-sm hidden sm:flex items-center gap-1">
          <span class="material-symbols-outlined text-sm">person</span>
          <span id="userName">Loading...</span>
        </span>
        <button onclick="logout()" class="text-xs text-gray-400 hover:text-white border border-white/10 px-3 py-1.5 rounded-lg transition">Logout</button>
      </div>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-4 py-10">

    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-black">Investor <span class="text-[#13ec13]">Dashboard</span></h1>
      <p class="text-gray-400 mt-1">Review incoming business pitches and make investment decisions.</p>
    </div>

    <!-- Filter tabs -->
    <div class="flex gap-2 mb-6 flex-wrap">
      <button onclick="filterPitches('all')" id="filter-all"
        class="filter-btn bg-[#13ec13] text-[#0d1b0d] font-bold px-4 py-1.5 rounded-full text-sm transition">
        All Pitches
      </button>
      <button onclick="filterPitches('Pending')" id="filter-Pending"
        class="filter-btn bg-white/5 hover:bg-white/10 text-gray-300 font-medium px-4 py-1.5 rounded-full text-sm transition">
        Pending
      </button>
      <button onclick="filterPitches('Approved')" id="filter-Approved"
        class="filter-btn bg-white/5 hover:bg-white/10 text-gray-300 font-medium px-4 py-1.5 rounded-full text-sm transition">
        Approved
      </button>
      <button onclick="filterPitches('Rejected')" id="filter-Rejected"
        class="filter-btn bg-white/5 hover:bg-white/10 text-gray-300 font-medium px-4 py-1.5 rounded-full text-sm transition">
        Rejected
      </button>
    </div>

    <!-- Pitches List -->
    <div id="investorPitches">
      <p class="text-gray-400 text-sm text-center py-8">Loading pitches...</p>
    </div>
  </div>

  <script>
    let currentFilter = "all";
    window.filterPitches = function(filter) {
      currentFilter = filter;
      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.className = "filter-btn bg-white/5 hover:bg-white/10 text-gray-300 font-medium px-4 py-1.5 rounded-full text-sm transition";
      });
      const active = document.getElementById("filter-" + filter);
      if (active) active.className = "filter-btn bg-[#13ec13] text-[#0d1b0d] font-bold px-4 py-1.5 rounded-full text-sm transition";

      document.querySelectorAll(".pitch-card").forEach(card => {
        const status = card.dataset.status;
        card.style.display = (filter === "all" || status === filter) ? "block" : "none";
      });
    };
  </script>
  <script type="module" src="script.js"></script>
</body>
</html>
